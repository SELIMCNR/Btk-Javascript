       document.write(metin);

       document.write(sonuc);

       /*match() : Kendisine verilen parametrede değer var ise yeni değişkende değeri tutar*/
       /*g    : İçeriğin tamamı üzerine çalışmasını sağlar*/
       /*i    : İçeriğin büyük küçük harf olmasına bakmaz*/

       /* replace ()  : Kendisine verilecel olan parametreler doğrultusunda değişken içeriğini değiştirir ve yeni değeri yazar*/

        2.parametre : Güncel içerik*/

       /*i    : İçeriğin büyük küçük harf olmasına bakmaz*/

        document.write(icerikiki);
        var sonuc = icerikbir.localeCompare(icerikiki);

        var sonuc = icerikbir.localeCompare(icerikiki);
        document.write("<br />"+sonuc);
      /*charAt()   : değişken içeriğinde karakterleri yazdırır.*/

        /*fromCharCode() : Kendisine parametre olarak verilen utf-8e(evrensel)değerini karakter olarak çevirir.*/

        /*encodeURI() : Değişken içerisindeki özel karakterleri UTF-8 kodlamasında dönüştürerek oluşturur*/
        /*Kodlamaya dahil değil: ABCDEFGĞIİJKLMNOÖPRSŞTUÜVYZ
         0123456789 :; /? @ & _~() */

         document.write("<br />"+deger);

         document.write("<br />"+sonuc);
         /*decodeUrı()   : Değişken içerisindeki metnin özel karakterlerinin UTF-8 kodlamasına dönüşmüş karakterler çözerek verir.
          /*Kodlamaya dahil değil: ABCDEFGĞIİJKLMNOÖPRSŞTUÜVYZ
         0123456789 :; /? @ & _~() */
         var deger = "http://extraeğıtım.com?egıtımsetıadı=Javascrıpt&eğıtımadı" 
         document.write("<br />"+deger);

         document.write("<br />"+sonuc);

         /*encodeURICompenent()   :  UTF 8 kodlamasına dönüştürür.*/
          /*Kodlamaya dahil değil: ABCDEFGĞIİJKLMNOÖPRSŞTUÜVYZ
         0123456789 :; /? @ & _~() */
         var deger = "http://extraeğıtım.com?egıtımsetıadı=Javascrıpt&eğıtımadı"  ;
         document.write("<br/>"+deger);

         document.write(sonuc);   
         /*decodeURIComponent()   : Değişken içerisindeki metnin özel karakterlerinin Utf-8 kodlamasına çözerek değer döndürür.*/
                /*Kodlamaya dahil değil: ABCDEFGĞIİJKLMNOÖPRSŞTUÜVYZ

         var sonuc =encodeURIComponent(deger);

        // escape ()  : metni unicoda çeviriyor

         var deger = "Javascript eğitim seti";

         document.write(deger + "<br />");
         var sonuc = escape("<br />"+deger);
         // unescape() : özel karakterleri unicoda döndürür.   
               /*Kodlamaya dahil değil: ABCDEFGĞIİJKLMNOÖPRSŞTUÜVYZ

         var deger = "'/^%&()=?";

         // toUpper Case(): Değişken içindeki metnin tamamını büyük harfe döndürür
         var metin = "selim cınar";

        //toLowercase(): Değişken içindeki metnin tamamını küçük harfe döndürür.

        var yenimetin = metin.toLowerCase();
        document.write("<br />"+yenimetin);

        // toLocaleUppercase () : Değişken içerisindeki metnin tamamını tarayıcı diline göre büyük harfe döndürerek değeri geri döndürür.
        var metin = "ğüşiöç";

        // to localLowercase() : Değişken içerisindeki metnin tamamını tarayıcı diline göre küçük harfe dönüştürerek değeri geri döndürür.
